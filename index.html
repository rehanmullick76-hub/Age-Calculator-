<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Precision Age Calculator</title>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Roboto;
      background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .calculator-card {
      max-width: 620px;
      width: 100%;
      background: white;
      border-radius: 48px;
      padding: 2rem;
      box-shadow: 0 25px 45px rgba(0,0,0,0.2);
    }

    h2 { margin-bottom: 10px; }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 20px;
      background: #1f3a5f;
      color: white;
      border: none;
      cursor: pointer;
    }

    .result-card {
      margin-top: 20px;
      padding: 15px;
      background: #f0f6fe;
      border-radius: 20px;
    }

    .badge {
      display: inline-block;
      margin: 5px;
      padding: 5px 10px;
      background: white;
      border-radius: 20px;
    }
  </style>
</head>

<body>

<div class="calculator-card">
  <h2>✨ Precision Age Clock</h2>
   <label for="dob">📅 Date of birth</label>
  <input type="date" id="dob">
  </label>
  <input type="number" id="hour" placeholder="Hour">
  <input type="number" id="minute" placeholder="Minute">

  <button onclick="calculateAge()">Calculate</button>

  <div id="resultContainer" class="result-card" style="display:none;">
    <div id="result"></div>
    <div id="extraDetail"></div>
  </div>
</div>

<script>
(function(){

const dobInput = document.getElementById("dob");
const hourInput = document.getElementById("hour");
const minuteInput = document.getElementById("minute");

const resultDiv = document.getElementById("result");
const extraDetail = document.getElementById("extraDetail");
const resultContainer = document.getElementById("resultContainer");

function computeAge(birthDate, now){

  let years = now.getFullYear() - birthDate.getFullYear();
  let months = now.getMonth() - birthDate.getMonth();
  let days = now.getDate() - birthDate.getDate();
  let hours = now.getHours() - birthDate.getHours();
  let minutes = now.getMinutes() - birthDate.getMinutes();
  let seconds = now.getSeconds() - birthDate.getSeconds();

  if(seconds < 0){ seconds += 60; minutes--; }
  if(minutes < 0){ minutes += 60; hours--; }
  if(hours < 0){ hours += 24; days--; }

  if(days < 0){
    const prevMonth = new Date(now.getFullYear(), now.getMonth(), 0);
    days += prevMonth.getDate();
    months--;
  }

  if(months < 0){
    months += 12;
    years--;
  }

  const totalSecondsAlive = Math.floor((now - birthDate)/1000);
  const totalMinutesAlive = Math.floor(totalSecondsAlive/60);
  const totalHoursAlive = Math.floor(totalMinutesAlive/60);
  const totalDaysAlive = Math.floor(totalHoursAlive/24);

  // 🎂 Birthday
  const today = new Date(now);
  const thisYearBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());

  let nextBirthday = thisYearBirthday;
  if(thisYearBirthday < today){
    nextBirthday = new Date(today.getFullYear()+1, birthDate.getMonth(), birthDate.getDate());
  }

  const diff = nextBirthday - today;
  const daysLeft = Math.ceil(diff/(1000*60*60*24));

  const isBirthdayToday =
    today.getDate() === birthDate.getDate() &&
    today.getMonth() === birthDate.getMonth();

  return {
    years, months, days, hours, minutes, seconds,
    totalDaysAlive, totalHoursAlive, totalMinutesAlive, totalSecondsAlive,
    daysLeft, isBirthdayToday
  };
}

window.calculateAge = function(){

  const dob = dobInput.value;
  if(!dob) return;

  const hour = parseInt(hourInput.value)||0;
  const minute = parseInt(minuteInput.value)||0;

  const birthDate = new Date(dob);
  birthDate.setHours(hour, minute, 0, 0);

  const now = new Date();

  const age = computeAge(birthDate, now);

  const parts = [];
  if(age.years) parts.push(age.years+" Years");
  if(age.months) parts.push(age.months+" Months");
  if(age.days) parts.push(age.days+" Days");
  if(age.hours) parts.push(age.hours+" Hours");

  parts.push(age.minutes+" Minutes");
  parts.push(age.seconds+" Seconds");

  resultDiv.innerHTML = parts.join(", ");

  let birthdayText = "";
  if(age.isBirthdayToday){
    birthdayText = `<span class="badge">🎉 Birthday Today!</span>`;
  }else{
    birthdayText = `<span class="badge">🎂 ${age.daysLeft} days left</span>`;
  }

  extraDetail.innerHTML = `
    <span class="badge">Days: ${age.totalDaysAlive}</span>
    <span class="badge">Hours: ${age.totalHoursAlive}</span>
    <span class="badge">Minutes: ${age.totalMinutesAlive}</span>
    <span class="badge">Seconds: ${age.totalSecondsAlive}</span>
    ${birthdayText}
  `;

  resultContainer.style.display="block";
}

// 🔥 LIVE UPDATE
setInterval(()=>{
  calculateAge();
},1000);

})();
</script>

</body>
</html>
